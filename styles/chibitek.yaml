identity:
  name: "Chibitek"
  category: motion-graphics
  mood: confident, warm, no-geek-speak, quietly premium
  pace: moderate
  best_for: "Chibitek/Pulse content engine — MSP-to-MIP explainers, radar-driven news pieces, avatar spokesperson brand chrome"

visual_language:
  color_palette:
    primary: ["#00A7AF", "#007A80"]      # Chibitek teal
    accent: ["#F4B930", "#E0A31E"]       # Chibitek gold
    background: "#0B1220"                # house dark (matches Pulse renders)
    text: "#F5F7FA"
    muted: "#8B95A5"
  composition: centered, generous whitespace, single focal idea per scene
  texture: clean flat, subtle glass blur on cards, no grain

typography:
  headings:
    font: "Inter"
    weight: 800
    tracking: "-0.02em"
  body:
    font: "Inter"
    weight: 400
    line_height: 1.6
  code:
    font: "JetBrains Mono"
    weight: 400
  stat_card:
    font: "Inter"
    weight: 800
    size_multiplier: 3.0
  scale_system: "major_third"
  weight_matrix:
    title: 800
    heading: 700
    body: 400
    caption: 500

motion:
  transitions: [fade, dissolve, slide-left]
  animation_style: "ease-in-out, decisive, no bounce, no gimmicks"
  pacing_rules:
    min_scene_hold_seconds: 2.5
    max_scene_hold_seconds: 12
    text_card_hold_seconds: 3.5
    stat_card_hold_seconds: 3.0
    transition_duration_seconds: 0.4
  entrance: "fade-up with slight scale (0.96 -> 1.0)"
  exit: "fade-out"

audio:
  voice_style: "Erick's cloned voice — direct, experienced, talks like a smart friend, no corporate stiffness"
  music_mood: "understated electronic warmth, never distracting from narration"
  music_volume: 0.07
  sfx_style: "minimal; soft transition whooshes only"
  ducking_threshold_db: -3

asset_generation:
  image_prompt_prefix: "clean flat illustration, teal (#00A7AF) and gold (#F4B930) accents on deep navy (#0B1220), modern tech aesthetic, "
  image_negative_prompt: "photorealistic, 3d render, clip art, stock-photo look, cluttered, low quality"
  diagram_style: "clean lines, rounded nodes, teal strokes, gold highlights"
  consistency_anchors:
    - "Teal (#00A7AF) is the primary accent in every illustration"
    - "Gold (#F4B930) reserved for the single most important element per scene"
    - "Deep navy (#0B1220) backgrounds throughout — matches avatar render background"
    - "Flat illustration, soft even lighting, no dramatic shadows"

overlays:
  stat_card:
    bg: "#111A2C"
    border: "#00A7AF"
    radius: 12
    shadow: "0 2px 12px rgba(0,0,0,0.35)"
  key_term:
    bg: "#0E2A2C"
    text: "#00A7AF"
    radius: 6
  code_block:
    bg: "#0A0F1A"
    text: "#E5E7EB"
    highlight: "#F4B930"

quality_rules:
  - "Minimum contrast ratio 4.5:1 for all text"
  - "Gold appears at most once per scene — it marks THE takeaway"
  - "No more than 3 colors on screen at once (excluding background)"
  - "Text must be readable at 720p"
  - "No rapid cuts — minimum 2s between transitions"
  - "No emojis, no em dashes in on-screen copy (house style)"

chart_palette:
  - "#00A7AF"
  - "#F4B930"
  - "#5EC9CE"
  - "#8B95A5"
  - "#E0A31E"
  - "#3D7A7D"

color_rules:
  harmony_type: "analogous"
  contrast_validation: true
  colorblind_safe: true
